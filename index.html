<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light dark" />
    <title>Mom Recipes — План питания для семьи</title>
    <meta name="description" content="Умное планирование рациона для семьи. Генерация рецептов, план на неделю и удобная корзина покупок." />
    <meta name="author" content="Mom Recipes" />
    <!-- Иконки приложения Mom Recipes (PWA, Android, iOS) -->
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/mom-recipes-app-icon-512.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="manifest" href="/manifest.json" />
    <!-- PWA: согласовано с manifest + splash; дубликат без media — fallback для клиентов без поддержки media у theme-color -->
    <!-- Значения подменяет ThemeColorMeta.tsx; до гидрации — скрипт ниже + --splash-bg -->
    <meta name="theme-color" content="#E8F1EC" />
    <meta name="theme-color" content="#E8F1EC" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1C1C22" media="(prefers-color-scheme: dark)" />
    <!-- PWA / iOS standalone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mom Recipes" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Open Graph: по умолчанию вариант #2 (og-onion). Варианты: og-brain.jpg, og-onion.jpg, og-panic.jpg -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mom Recipes — План питания для семьи" />
    <meta property="og:description" content="От первого прикорма до изысканного ужина. Умное планирование рациона для здоровья и спокойствия." />
    <meta property="og:url" content="https://momrecipes.online" />
    <!-- v=2: cache-bust so Telegram fetches fresh preview (og-onion = variant #2) -->
    <meta property="og:image" content="https://momrecipes.online/og/og-onion.jpg?v=2" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mom Recipes — План питания для семьи" />
    <meta name="twitter:description" content="Умное планирование рациона для всей семьи." />
    <meta name="twitter:image" content="https://momrecipes.online/og/og-onion.jpg?v=2" />

    <!-- Должен совпадать с LB_THEME_STORAGE_KEY в src/constants/themeStorage.ts (lb-theme) -->
    <script>
      (function () {
        try {
          var KEY = "lb-theme";
          var raw = localStorage.getItem(KEY);
          var t;
          if (raw === "light" || raw === "dark") {
            t = raw;
          } else {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
            localStorage.setItem(KEY, t);
          }
          var dark = t === "dark";
          document.documentElement.classList.toggle("dark", dark);
          document.documentElement.style.setProperty("--splash-bg", dark ? "#1c1c22" : "#e8f1ec");
        } catch (e) {}
      })();
    </script>
    <!-- Критичный splash: до загрузки main.tsx (иначе пустой WebView и «мигание») -->
    <link rel="preload" href="/splash/splash-screen.png" as="image" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background-color: var(--splash-bg, #e8f1ec);
      }
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background-color: var(--splash-bg, #e8f1ec);
        background-image: url(/splash/splash-screen.png);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <script>
      window.__momRecipesSplashStartMs = Date.now();
    </script>
    <div id="splash-screen" role="img" aria-label="Mom Recipes"></div>
    <div id="root"></div>
    <!-- PWA: Service Worker registered in main.tsx (production). Offline fallback: /offline.html -->
    <script type="module" src="/src/main.tsx"></script>
    <!-- Top.Mail.Ru counter (VK Ads) -->
    <script type="text/javascript">
      var _tmr = window._tmr || (window._tmr = []);
      _tmr.push({ id: "3760703", type: "pageView", start: new Date().getTime() });
      (function (d, w, id) {
        if (d.getElementById(id)) return;
        var ts = d.createElement("script");
        ts.type = "text/javascript";
        ts.async = true;
        ts.id = id;
        ts.src = "https://top-fwz1.mail.ru/js/code.js";
        var f = function () {
          var s = d.getElementsByTagName("script")[0];
          s.parentNode.insertBefore(ts, s);
        };
        if (w.opera == "[object Opera]") {
          d.addEventListener("DOMContentLoaded", f, false);
        } else {
          f();
        }
      })(document, window, "tmr-code");
    </script>
    <noscript>
      <div>
        <img
          src="https://top-fwz1.mail.ru/counter?id=3760703;js=na"
          style="position: absolute; left: -9999px"
          alt="Top.Mail.Ru"
        />
      </div>
    </noscript>
    <!-- /Top.Mail.Ru counter -->
  </body>
</html>
